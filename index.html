<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Plants Against Derps</title>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #071014;
      color: white;
      font-family: system-ui, Arial, sans-serif;
    }

    noscript {
      display: block;
      padding: 24px;
      font-size: 20px;
    }

    #loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(80, 220, 255, 0.2), transparent 30%),
        linear-gradient(135deg, #030608, #0c181d 55%, #05080a);
    }

    #loading h1 {
      color: #f8ff74;
      font-size: clamp(34px, 8vw, 80px);
      margin: 0;
    }

    #loading p {
      color: #d7faff;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <noscript>
    Plants Against Derps needs JavaScript enabled to run.
  </noscript>

  <div id="loading">
    <div>
      <h1>Plants Against Derps</h1>
      <p>Loading da derps...</p>
    </div>
  </div>

  <script>
    window.addEventListener("error", function (event) {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.innerHTML = `<div style="max-width:760px;padding:24px"><h1>PAD hit an error</h1><p style="white-space:pre-wrap;color:#ffd0d0">${event.message || "Unknown error"}</p><p>Open Inspect Element → Console and send the first red error.</p></div>`;
      }
    });
  </script>
  <script src="main.js?v=29-rescue-1"></script>
  <script>
    // Safe PVP entry button. This does not replace or patch PAD's core menu.
    (function () {
      function addPvpButton() {
        if (document.getElementById("padSafePvpButton")) return;
        const b = document.createElement("button");
        b.id = "padSafePvpButton";
        b.textContent = "PVP TEST";
        b.title = "Open the experimental Plant vs Derp connection test";
        Object.assign(b.style, {
          position: "fixed", right: "14px", bottom: "14px", zIndex: "99999",
          padding: "14px 20px", border: "3px solid #101010", borderRadius: "14px",
          background: "#d9ff78", color: "#071014", fontWeight: "900",
          fontSize: "16px", cursor: "pointer", boxShadow: "0 5px 0 #101010"
        });
        b.onclick = function () { location.href = "pvp/"; };
        document.body.appendChild(b);
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", addPvpButton);
      else addPvpButton();
      setTimeout(addPvpButton, 1200);
    })();
  </script>
</body>
</html>
